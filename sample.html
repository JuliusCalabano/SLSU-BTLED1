<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .photo-collage1 {
    position: relative;
}

.overlay-title {
    position: absolute;
    top: 50%;         /* vertically center */
    left: 50%;        /* horizontally center */
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;     /* or any color contrasting with images */
    z-index: 10;      /* make sure it is above images */
    pointer-events: none; /* allows clicking images */
}

.overlay-title .btled-title {
    font-size: 2.4rem;
    -webkit-text-stroke: 1px black; /* optional stroke */
}
.overlay-title .btled-subtitle {
    font-size: 1.2rem;
}
    </style>
</head>
<body>
    <section class="photo-collage1" style="position: relative;">
    <div class="photo-collage">
        <!-- images here -->
        <img src="./pic1.jpg" class="square" alt="">
        <img src="./pic2.jpg" class="rectangle" alt="">
        <img src="./pic3.jpg" class="square" alt="">
        <img src="./pic3.jpg" class="rectangle" alt="">
        <img src="./pic2.jpg" class="square" alt="">
        <img src="./pic1.jpg" class="square" alt="">
    </div>

    <!-- Overlay Title -->
    <div class="overlay-title">
        <h1 class="btled-title btled-typing" id="btledTitle"></h1>
        <p class="btled-subtitle btled-typing" id="btledSubtitle"></p>
    </div>
</section>
<script src="script.js"></script>
</body>
</html>
